services:
  kodi:
    image: matthuisman/kodi-headless:Omega
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
    volumes:
      - ./mnt/temp:/config/.kodi/temp
      - ./mnt/addon_data/:/config/.kodi/userdata/addon_data
      - ../plugin/src:/config/.kodi/addons/plugin.video.dropout.tv
    ports:
      - 8080:8080
      - 9090:9090
      - 9777:9777/udp
