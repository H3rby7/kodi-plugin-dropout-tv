name: Create ZIP
run-name: Zip, zip, zipping on repo's '${{ github.ref }}'
on: [push]
jobs:
  Zip:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
      - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."
      - run: echo "🍏 This job's status is ${{ job.status }}."
      - name: ZIP files
        run: |
          cd ${{ github.workspace }}/plugin
          zip -r ${{ github.workspace }}/plugin.video.dropout.tv-0.1.0-alpha.zip ./*
      - uses: AButler/upload-release-assets@v2.0
        with:
          files: ${{ github.workspace }}/plugin.video.dropout.tv-0.1.0-alpha.zip
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin.video.dropout.tv-0.1.0-alpha
          path: ${{ github.workspace }}/plugin.video.dropout.tv-0.1.0-alpha.zip
